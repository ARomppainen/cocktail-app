<!DOCTYPE html>

<html lang="en">

<head>
    <title>Index</title>
</head>

<body>
    <p>Hello {{ session.user.username }}</p>

    <a href="/recipes/new">Create a new recipe</a>

    <h2>Recipes</h2>
    <ul>
        {% for recipe in recipes %}
        <li><a href="/recipes/{{recipe.id}}">{{recipe.title}}</a></li>
        {% endfor %}
    </ul>

    <form action="/logout" method="post">
        <input type="submit" value="Log out" />
    </form>
</body>

</html>
