{% extends "layouts/base.html" %}
{% import 'macros/recipe_details.html' as recipe_details %}
{% block content %}
<section>
    <h2>Latest recipes</h2>
    {% if recipes %}
    <ul class="carousel">
        {% for recipe in recipes %}
        <li>
            <article>
                {{ recipe_details.render(recipe) }}
            </article>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p>No recipes found</p>
    {% endif %}
</section>
{% endblock %}
