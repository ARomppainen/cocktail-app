{% extends "layouts/base.html" %}
{% block content %}
<h2>Recipe details</h2>
<p>{{recipe.title}}</p>
<p>{{recipe.ingredients | show_lines}}</p>
<p>{{recipe.glass}}</p>
<p>{{recipe.instructions | show_lines}}</p>

{% if session.user and session.user.id == recipe.user_id %}
<a href="/recipes/{{recipe.id}}/update">Edit recipe</a>
<form action="/recipes/{{recipe.id}}/delete" method="post">
    <input type="submit" value="Delete recipe" />
</form>
{% endif %}
{% endblock %}
