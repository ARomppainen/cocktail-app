<!DOCTYPE html>

<html lang="en">

<head>
    <title>Recipe details</title>
</head>

<body>
    <h1>{{recipe.title}}</h1>
    <p>{{recipe.ingredients}}</p>
    <p>{{recipe.glass}}</p>
    <p>{{recipe.instructions}}</p>

    {% if session.user.id == recipe.user_id %}
    <a href="/recipes/{{recipe.id}}/update">Edit recipe</a>
    <form action="/recipes/{{recipe.id}}/delete" method="post">
        <input type="submit" value="Delete recipe" />
    </form>
    {% endif %}

</html>
