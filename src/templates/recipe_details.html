<!DOCTYPE html>

<html lang="en">

<head>
    <title>Recipe details</title>
</head>

<body>
    <h1>{{recipe.title}}</h1>
    <p>{{recipe.ingredients}}</p>
    <p>{{recipe.glass}}</p>
    <p>{{recipe.instructions}}</p>

    {% if session.user.id == recipe.user_id %}
    <a href="/recipe/{{recipe.id}}/update">Edit recipe</a>
    {% endif %}

</html>
