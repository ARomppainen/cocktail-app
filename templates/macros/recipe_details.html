{% macro render(recipe) -%}
<h3>{{recipe.title}}</h3>
<p>{{recipe.ingredients | show_lines}}</p>
<p>{{recipe.instructions | show_lines}}</p>
{% if recipe.tags %}
<p><span>Tags: </span>{{recipe.tags}}</p>
{% endif %}
{% if recipe.avg_rating %}
<p><span>Rating: </span>{{recipe.avg_rating | round(2, 'common')}}</p>
{% endif %}
{%- endmacro %}
